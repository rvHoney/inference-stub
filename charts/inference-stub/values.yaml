replicaCount: 1

image:
  repository: ghcr.io/robin-vidal/inference-stub
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

stubConfig:
  port: 8080
  ttft: 100ms
  tpot: 20ms
  length: 50
  timeout: 1m0s
  debug: false

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 32Mi

nodeSelector: {}

tolerations: []

affinity: {}
